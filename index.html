<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed Reader</title>
  <link rel="icon" type="image/png" href="/favicons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg" />
  <link rel="shortcut icon" href="/favicons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
  <link rel="manifest" href="/favicons/site.webmanifest" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div>
          <h1>Speed Reader</h1>
          <p class="subtitle">Read faster with RSVP technique</p>
        </div>
        <div class="header-actions">
          <a href="https://chromewebstore.google.com/detail/speed-reader/iifbkjcdekfokhpjbiabfgjlloabpdlp" target="_blank" rel="noopener" class="extension-btn" title="Get Chrome Extension">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>
            </svg>
            <span>Get Extension</span>
          </a>
          <button id="themeToggle" class="icon-btn" title="Toggle theme">
            <svg id="sunIcon" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
            </svg>
            <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Input Section -->
      <div id="inputSection">
        <div class="input-tabs">
          <button class="tab active" data-tab="text">Paste Text</button>
          <button class="tab" data-tab="url">From URL</button>
        </div>

        <div class="tab-content active" id="textTab">
          <textarea id="textInput" placeholder="Paste your text here..."></textarea>
        </div>

        <div class="tab-content" id="urlTab">
          <input type="url" id="urlInput" placeholder="https://example.com/article">
          <p class="hint">Enter article URL to extract and read content</p>
        </div>

        <button id="startBtn" class="primary-btn">Start Reading</button>
      </div>

      <!-- Reader Section (appears after start) -->
      <div id="readerSection" class="hidden">
        <!-- RSVP Display -->
        <div id="reader">
          <div class="word-display">
            <div id="currentWord"></div>
          </div>

          <div class="controls">
            <button id="restartBtn" title="Restart (R)">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
              </svg>
            </button>
            <button id="rewindBtn" title="Previous word">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/>
              </svg>
            </button>
            <button id="playPauseBtn" title="Play/Pause (Space)">
              <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="#e74c3c" stroke="#e74c3c" stroke-width="2">
                <path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/>
              </svg>
              <svg id="pauseIcon" style="display:none" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="#e74c3c" stroke="#e74c3c" stroke-width="2">
                <rect x="14" y="3" width="5" height="18" rx="1"/><rect x="5" y="3" width="5" height="18" rx="1"/>
              </svg>
            </button>
            <button id="forwardBtn" title="Next word">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m13 17 5-5-5-5"/><path d="m6 17 5-5-5-5"/>
              </svg>
            </button>
            <div class="speed-control">
              <input type="range" id="speedSlider" min="100" max="1000" step="50" value="300">
              <span id="wpmValue">300 wpm</span>
            </div>
            <span id="readingTime"></span>
            <button id="closeReaderBtn" class="icon-btn small" title="Close reader">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
              </svg>
            </button>
          </div>

          <div class="progress-bar">
            <div id="progressFill"></div>
          </div>
        </div>

        <!-- Text Following View -->
        <div id="textView">
          <div id="textContent"></div>
        </div>

        <!-- Finish Overlay -->
        <div id="finishOverlay" class="hidden">
          <div id="confetti"></div>
          <div class="finish-content">
            <div class="finish-text">Finished!</div>
            <button id="readAgainBtn" class="secondary-btn">Read Again</button>
          </div>
        </div>
      </div>

    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <p>Loading article...</p>
    </div>

    <!-- Error Toast -->
    <div id="errorToast"></div>
  </div>

  <script src="Readability.js"></script>
  <script src="app.js"></script>
</body>
</html>
